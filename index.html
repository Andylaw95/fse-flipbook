<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>FSE Brochure — Digital Publication Viewer</title>
    <meta name="description" content="FSE Engineering Group — Interactive Digital Brochure">

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="FSE Brochure — Digital Publication Viewer">
    <meta property="og:description" content="View the FSE Engineering Group brochure online with interactive page-flipping.">
    <meta property="og:type" content="website">

    <!-- PDF.js from CDN -->
    <link rel="stylesheet" href="css/flipbook.css">

    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"
            crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Favicon (inline SVG as data URL) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loader-container">
            <div class="loader-spinner"></div>
            <p class="loader-text" data-i18n="loading">Loading publication...</p>
            <div class="loader-progress">
                <div class="loader-progress-bar" id="load-progress-bar"></div>
            </div>
            <p class="loader-percent" id="load-percent">0%</p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app" class="app hidden">
        <!-- Top Toolbar -->
        <header class="toolbar" id="toolbar">
            <div class="toolbar-left">
                <button class="toolbar-btn" id="btn-menu" title="Menu" aria-label="Toggle sidebar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
                <span class="toolbar-title" id="toolbar-title">FSE Brochure</span>
            </div>
            <div class="toolbar-center">
                <button class="toolbar-btn" id="btn-prev" title="Previous page" aria-label="Previous page">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <div class="page-indicator">
                    <input type="number" id="page-input" class="page-input" min="1" value="1" aria-label="Current page">
                    <span class="page-separator">/</span>
                    <span id="page-total">0</span>
                </div>
                <button class="toolbar-btn" id="btn-next" title="Next page" aria-label="Next page">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 18 15 12 9 6"/>
                    </svg>
                </button>
            </div>
            <div class="toolbar-right">
                <button class="toolbar-btn" id="btn-zoom-out" title="Zoom out" aria-label="Zoom out">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <select class="zoom-select" id="zoom-select" aria-label="Zoom level">
                    <option value="0.5">50%</option>
                    <option value="0.75">75%</option>
                    <option value="1" selected>100%</option>
                    <option value="1.25">125%</option>
                    <option value="1.5">150%</option>
                    <option value="2">200%</option>
                </select>
                <button class="toolbar-btn" id="btn-zoom-in" title="Zoom in" aria-label="Zoom in">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
                    </svg>
                </button>
                <div class="toolbar-divider"></div>
                <button class="toolbar-btn" id="btn-share" title="Share" aria-label="Share publication">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btn-download" title="Download PDF" aria-label="Download PDF">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btn-print" title="Print" aria-label="Print publication">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
                    </svg>
                </button>
                <button class="toolbar-btn" id="btn-fullscreen" title="Fullscreen" aria-label="Toggle fullscreen">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="icon-fullscreen">
                        <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                </button>
                <!-- Language Selector -->
                <div class="lang-selector">
                    <button class="toolbar-btn" id="btn-lang" title="Language" aria-label="Change language">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10A15.3 15.3 0 0 1 12 2z"/>
                        </svg>
                    </button>
                    <div class="lang-dropdown hidden" id="lang-dropdown">
                        <button class="lang-option" data-lang="en">English</button>
                        <button class="lang-option" data-lang="zh-TW">繁體中文</button>
                        <button class="lang-option" data-lang="zh-CN">简体中文</button>
                        <button class="lang-option" data-lang="ja">日本語</button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Sidebar (Thumbnails / Table of Contents) -->
        <aside class="sidebar hidden" id="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" data-tab="thumbnails" data-i18n="thumbnails">Thumbnails</button>
                <button class="sidebar-tab" data-tab="bookmarks" data-i18n="bookmarks">Bookmarks</button>
            </div>
            <div class="sidebar-content" id="sidebar-content">
                <div class="thumbnail-grid" id="thumbnail-grid"></div>
                <div class="bookmark-list hidden" id="bookmark-list">
                    <p class="no-bookmarks" data-i18n="noBookmarks">No bookmarks yet. Click on a page to bookmark it.</p>
                </div>
            </div>
        </aside>

        <!-- Main Viewer Area -->
        <main class="viewer" id="viewer">
            <div class="flipbook-container" id="flipbook-container">
                <div class="flipbook" id="flipbook">
                    <!-- Pages rendered dynamically -->
                </div>
            </div>

            <!-- Navigation Arrows (Mobile/Overlay) -->
            <button class="nav-arrow nav-arrow-left" id="nav-prev" aria-label="Previous page">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <button class="nav-arrow nav-arrow-right" id="nav-next" aria-label="Next page">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </main>

        <!-- Bottom Page Scrubber -->
        <div class="scrubber" id="scrubber">
            <input type="range" id="page-scrubber" min="1" value="1" class="scrubber-range" aria-label="Page scrubber">
            <div class="scrubber-preview hidden" id="scrubber-preview"></div>
        </div>

        <!-- Share Modal -->
        <div class="modal-overlay hidden" id="share-modal">
            <div class="modal" role="dialog" aria-labelledby="share-title">
                <div class="modal-header">
                    <h3 id="share-title" data-i18n="shareTitle">Share this publication</h3>
                    <button class="modal-close" id="share-close" aria-label="Close">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="share-buttons">
                        <button class="share-btn share-facebook" id="share-facebook" title="Facebook">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                            <span>Facebook</span>
                        </button>
                        <button class="share-btn share-twitter" id="share-twitter" title="Twitter/X">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                            <span>X (Twitter)</span>
                        </button>
                        <button class="share-btn share-linkedin" id="share-linkedin" title="LinkedIn">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
                            <span>LinkedIn</span>
                        </button>
                        <button class="share-btn share-email" id="share-email" title="Email">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <span>Email</span>
                        </button>
                    </div>
                    <div class="share-link-container">
                        <label data-i18n="copyLink">Copy link:</label>
                        <div class="share-link-row">
                            <input type="text" id="share-link-input" class="share-link-input" readonly>
                            <button class="btn-copy" id="btn-copy-link" data-i18n="copy">Copy</button>
                        </div>
                    </div>
                    <div class="embed-code-container">
                        <label data-i18n="embedCode">Embed code:</label>
                        <div class="share-link-row">
                            <textarea id="embed-code" class="embed-code" readonly rows="3"></textarea>
                            <button class="btn-copy" id="btn-copy-embed" data-i18n="copy">Copy</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/flipbook-engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
